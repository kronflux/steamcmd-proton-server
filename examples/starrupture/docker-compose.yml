# Star Rupture Dedicated Server

services:
  starrupture:
    image: kronflux/steamcmd-proton-server:latest
    container_name: starrupture
    restart: unless-stopped

    environment:
      # Core (preset sets STEAM_APP_ID, GAME_EXECUTABLE, NEEDS_DISPLAY)
      - GAME_CONFIG=starrupture

      # Server Identity
      - SERVER_NAME=Star Rupture Server
      - SERVER_PASSWORD=                 # Leave empty for public server
      - MAX_PLAYERS=10

      # Save/Game settings
      - SR_SESSION_NAME=StarRuptureServer # Session/save name
      - SR_SAVE_INTERVAL=300             # Auto-save interval in seconds
      - SR_START_NEW_GAME=false           # Create a new world on first run
      - SR_LOAD_SAVED_GAME=true           # Load existing save
      - SR_SAVE_GAME_NAME=AutoSave0.sav   # Save file name

      # Security (recommended: keep these true)
      - SR_DISABLE_WEB_CONTROL=true       # Disable web control interface
      - SR_DISABLE_WEB_INTERFACE=true     # Disable web interface

      # Ports (must match port mappings below)
      - GAME_PORT=7777
      - QUERY_PORT=27015

      # Steam
      - STEAM_USER=anonymous
      - STEAM_VALIDATE=false

      # Backup
      - BACKUP_RETENTION=7

    ports:
      - "7777:7777/tcp"
      - "7777:7777/udp"
      - "27015:27015/udp"

    volumes:
      - ./data:/data

    deploy:
      resources:
        limits:
          cpus: '4'
          memory: 8G
        reservations:
          cpus: '2'
          memory: 4G
