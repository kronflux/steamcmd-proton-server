# DayZ Dedicated Server Preset

# Required — game-specific, always set by preset
export STEAM_APP_ID=223350
export GAME_EXECUTABLE=DayZServer_x64.exe
export GAME_MODE=steam
export GAME_CONFIG=dayz
export NEEDS_DISPLAY=true

# Defaults — only applied when the user hasn't provided the variable
export SERVER_NAME="${SERVER_NAME:-DayZ Server}"
export SERVER_PASSWORD="${SERVER_PASSWORD:-}"
export ADMIN_PASSWORD="${ADMIN_PASSWORD:-}"
export MAX_PLAYERS="${MAX_PLAYERS:-60}"
export GAME_PORT="${GAME_PORT:-2302}"
export QUERY_PORT="${QUERY_PORT:-2303}"
