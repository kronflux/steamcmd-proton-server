# Sons of the Forest Dedicated Server Preset
# App ID 2465200 is the dedicated server
# App ID 1326470 is the game client (used for Proton prefix)

# Required — game-specific, always set by preset
export STEAM_APP_ID=2465200
export PROTON_APP_ID=1326470
export GAME_EXECUTABLE=SonsOfTheForestDS.exe
export GAME_MODE=steam
export GAME_CONFIG=sons-of-the-forest
export NEEDS_DISPLAY=true

# Defaults — only applied when the user hasn't provided the variable
export SERVER_NAME="${SERVER_NAME:-Sons of the Forest Server}"
export SERVER_PASSWORD="${SERVER_PASSWORD:-}"
export MAX_PLAYERS="${MAX_PLAYERS:-8}"
export GAME_PORT="${GAME_PORT:-8766}"
export QUERY_PORT="${QUERY_PORT:-27016}"
export BLOBSYNC_PORT="${BLOBSYNC_PORT:-9700}"
export SOTF_GAME_MODE="${SOTF_GAME_MODE:-Normal}"
export SAVE_SLOT="${SAVE_SLOT:-1}"
