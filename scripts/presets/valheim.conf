# Valheim Dedicated Server Preset

# Required — game-specific, always set by preset
export STEAM_APP_ID=896660
export GAME_EXECUTABLE=valheim_server.x86_64
export GAME_MODE=steam
export GAME_CONFIG=valheim
export NEEDS_DISPLAY=true

# Defaults — only applied when the user hasn't provided the variable
export SERVER_NAME="${SERVER_NAME:-Valheim Server}"
export SERVER_PASSWORD="${SERVER_PASSWORD:-}"
export WORLD_NAME="${WORLD_NAME:-Dedicated}"
export GAME_PORT="${GAME_PORT:-2456}"
export QUERY_PORT="${QUERY_PORT:-2457}"
