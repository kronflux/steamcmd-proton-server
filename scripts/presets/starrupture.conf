# Star Rupture Dedicated Server Preset
# App ID 3809400 is the dedicated server

# Required — game-specific, always set by preset
export STEAM_APP_ID=3809400
export GAME_EXECUTABLE=StarRupture/Binaries/Win64/StarRuptureServerEOS-Win64-Shipping.exe
export GAME_MODE=steam
export GAME_CONFIG=starrupture
export NEEDS_DISPLAY=true

# Defaults — only applied when the user hasn't provided the variable
export SERVER_NAME="${SERVER_NAME:-Star Rupture Server}"
export SERVER_PASSWORD="${SERVER_PASSWORD:-}"
export MAX_PLAYERS="${MAX_PLAYERS:-10}"
export GAME_PORT="${GAME_PORT:-7777}"
export QUERY_PORT="${QUERY_PORT:-27015}"

# Star Rupture save/game settings
export SR_SESSION_NAME="${SR_SESSION_NAME:-StarRuptureServer}"
export SR_SAVE_INTERVAL="${SR_SAVE_INTERVAL:-300}"
export SR_START_NEW_GAME="${SR_START_NEW_GAME:-false}"
export SR_LOAD_SAVED_GAME="${SR_LOAD_SAVED_GAME:-true}"
export SR_SAVE_GAME_NAME="${SR_SAVE_GAME_NAME:-AutoSave0.sav}"

# Security — disable web management interface by default
export SR_DISABLE_WEB_CONTROL="${SR_DISABLE_WEB_CONTROL:-true}"
export SR_DISABLE_WEB_INTERFACE="${SR_DISABLE_WEB_INTERFACE:-true}"
