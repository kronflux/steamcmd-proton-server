# Subnautica with Nitrox Multiplayer Mod Preset
# Nitrox runs as a native Linux server — Proton is NOT used

# Required — game-specific, always set by preset
export STEAM_APP_ID=264710
export GAME_EXECUTABLE=NitroxServer-Subnautica
export GAME_MODE=steam
export GAME_CONFIG=subnautica-nitrox

# Defaults — only applied when the user hasn't provided the variable
export SERVER_PASSWORD="${SERVER_PASSWORD:-}"
export MAX_PLAYERS="${MAX_PLAYERS:-100}"
export GAME_PORT="${GAME_PORT:-11000}"
export NITROX_SAVE_NAME="${NITROX_SAVE_NAME:-MyServer}"
