# GitHub Actions workflow for building and pushing Docker images
# Builds on push to main branch and on version tags

name: Build and Push Docker Image

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  pull_request:
    branches:
      - main

env:
  DOCKER_IMAGE: kronflux/steamcmd-proton-server
  DOCKERFILE_PATH: ./docker

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.DOCKER_IMAGE }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ${{ env.DOCKERFILE_PATH }}/Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64

      - name: Image digest
        run: echo ${{ steps.build.outputs.digest }}

  test:
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name != 'pull_request'
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Pull built image
        run: |
          docker pull ${{ env.DOCKER_IMAGE }}:latest || true

      - name: Test Proton detection
        run: |
          docker run --rm --entrypoint "" ${{ env.DOCKER_IMAGE }}:latest \
            bash -c "source /scripts/functions.sh && detect_proton && echo \$PROTONPATH"

      - name: Test SteamCMD
        run: |
          docker run --rm --entrypoint "" ${{ env.DOCKER_IMAGE }}:latest \
            bash -c "/steamcmd/steamcmd.sh +version +quit"

      - name: Test Wine prefix initialization
        run: |
          docker run --rm --entrypoint "" -v /tmp/test-wine:/data ${{ env.DOCKER_IMAGE }}:latest \
            bash -c "source /scripts/functions.sh && init_wine_prefix /data/wine && ls /data/wine"

      - name: Test health check script
        run: |
          docker run --rm --entrypoint "" ${{ env.DOCKER_IMAGE }}:latest \
            bash -c "bash /scripts/healthcheck.sh || echo 'Expected: No server running'"

  # Release job - creates GitHub release on version tag
  release:
    runs-on: ubuntu-latest
    needs: [build, test]
    if: startsWith(github.ref, 'refs/tags/v')
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          draft: false
          prerelease: false
          generate_release_notes: true
          body: |
            ## Docker Image
            ```bash
            docker pull ${{ env.DOCKER_IMAGE }}:${{ github.ref_name }}
            ```
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
